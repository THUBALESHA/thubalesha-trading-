<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THUBALESHA Store</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#fffaf5,#f0e6d2);
}

header{
background:#000;
color:#fff;
padding:20px;
text-align:center;
}

header button{
margin-top:10px;
padding:8px 16px;
background:#d4af37;
border:none;
border-radius:6px;
cursor:pointer;
}

#searchBar{
width:90%;
max-width:400px;
padding:12px;
margin:20px auto;
display:block;
border-radius:10px;
border:1px solid #ccc;
}

#giftBox{
max-width:600px;
margin:10px auto;
background:#fff;
padding:15px;
border-radius:12px;
text-align:center;
}

#perfumeList{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
max-height:500px;
overflow-y:auto;
}

.card{
background:#fff;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
transition:.3s;
}

.card:hover{
transform:scale(1.05) rotateY(10deg);
}

.card button{
background:#000;
color:#fff;
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

#cartPanel{
position:fixed;
right:0;
top:0;
width:320px;
height:100%;
background:white;
padding:15px;
display:none;
overflow:auto;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
}

.pay-btn{
display:block;
margin-top:10px;
padding:10px;
background:#000;
color:#fff;
text-align:center;
border-radius:6px;
text-decoration:none;
}

.bank-box{
margin-top:10px;
background:#f5f5f5;
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<h2>THUBALESHA Fragrance</h2>
<button onclick="openCart()">🛒 Cart (<span id="cartCount">0</span>)</button>
</header>

<input type="text" id="searchBar" placeholder="Search perfume..." onkeyup="searchPerfume()">

<!-- GIFT -->
<div id="giftBox">
<h3>🎁 Spend R750 Get a FREE Gift</h3>
<progress id="giftBar" value="0" max="750" style="width:100%"></progress>
<p id="giftText">Add items to unlock your free gift</p>
</div>

<!-- PRODUCTS -->
<div id="perfumeList"></div>

<!-- CART -->
<div id="cartPanel">

<h3>Your Cart</h3>
<div id="cartItems"></div>

<p>Delivery: R<span id="deliveryPrice">60</span></p>
<h3>Total: R<span id="totalPrice">0</span></h3>

<button onclick="showCheckout()">Checkout</button>
<button onclick="closeCart()">Close</button>

<div id="checkout" style="display:none">

<h4>Customer Info</h4>
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Delivery Address">

<select id="deliveryOption" onchange="changeDelivery()">
<option value="60">Local Delivery R60</option>
<option value="120">Nationwide Delivery R120</option>
</select>

<input id="referral" placeholder="Referral Code (optional)">
<a class="pay-btn" id="whatsappOrder" target="_blank">Order first then payment</a>
<button class="pay-btn" onclick="sendOrder()">Send Order</button>

<!-- PAY -->
<a class="pay-btn" href="https://www.paypal.com/ncp/payment/2QBAVWTMDFPFW" target="_blank">Pay with PayPal</a>
<a class="pay-btn" href="https://pay.yoco.com/thubalesha-general-trading" target="_blank">Pay with Yoco</a>

<div class="bank-box">
<b>EFT</b><br>
TymeBank<br>
53000064836<br>
678910
</div>

<a class="pay-btn" id="whatsappOrder" target="_blank">Order via WhatsApp</a>
<button class="pay-btn" onclick="sendOrder()">Send Order</button>

</div>

</div>

<script>

emailjs.init("W0IlqsPfG7YcRg-AJ");

const perfumes=[
"Dior Poison","Chanel No.5","Lady Million","Good Girl","La Vie Est Belle",
"Black Opium","Red Door","Coppelia","Avroy Chalet","Paco Invictus",
"One Million","Tom Ford Oud Wood","Dunhill Red","Dunhill Black","Ted Lapidus",
"Creed Aventus","Aramis 900","Belagari","Hordelsol","Sheriff",
"OPRHE","PAN","ANG","DHL","Tza",
"Versace Eros","Gucci Bloom","Burberry Her","CK One","CK Be",
"Issey Miyake","Davidoff Cool Water","Bvlgari Man","Jaguar Classic",
"Lacoste White","Hugo Boss","Boss Bottled","212 VIP","212 Sexy",
"Mont Blanc Legend","Mont Blanc Explorer","Diesel Only The Brave",
"Azzaro Wanted","Azzaro Chrome","Nautica Voyage",
"YSL Libre","YSL Y","Armani Code","Armani Si",
"Givenchy Gentleman","Givenchy Irresistible",
"Joop Homme","Polo Blue","Polo Red","Polo Black"
];

let cart=[];
let deliveryFee=60;

function loadPerfumes(list){
let c=document.getElementById("perfumeList");
c.innerHTML="";
list.forEach(n=>{
c.innerHTML+=`
<div class="card">
<h4>${n}</h4>
<button onclick="addToCart('${n}',230)">Add</button>
</div>`;
});
}

function searchPerfume(){
let v=document.getElementById("searchBar").value.toLowerCase();
loadPerfumes(perfumes.filter(p=>p.toLowerCase().includes(v)));
}

function addToCart(name,price){
cart.push({name,price});
updateCart();
}

function changeDelivery(){
deliveryFee=parseInt(document.getElementById("deliveryOption").value);
document.getElementById("deliveryPrice").innerText=deliveryFee;
updateCart();
}

function updateCart(){
let items=document.getElementById("cartItems");
let total=0;

items.innerHTML="";

cart.forEach(p=>{
items.innerHTML+=`<p>${p.name} - R${p.price}</p>`;
total+=p.price;
});

total+=deliveryFee;

document.getElementById("totalPrice").innerText=total;
document.getElementById("cartCount").innerText=cart.length;

/* GIFT */
let bar=document.getElementById("giftBar");
let text=document.getElementById("giftText");

bar.value=total;

if(total>=750){
text.innerHTML="🎉 FREE Gift Unlocked!";
}else{
text.innerHTML="Spend R"+(750-total)+" more";
}

/* WHATSAPP */
let order=cart.map(p=>p.name).join(", ");
let ref=document.getElementById("referral").value;

document.getElementById("whatsappOrder").href=
"https://wa.me/27656911520?text=Order: "+order+
"%0AAddress: "+document.getElementById("address").value+
"%0ADelivery: R"+deliveryFee+
"%0AReferral: "+ref+
"%0ATotal: R"+total;
}

function openCart(){document.getElementById("cartPanel").style.display="block";}
function closeCart(){document.getElementById("cartPanel").style.display="none";}
function showCheckout(){document.getElementById("checkout").style.display="block";}

function sendOrder(){
let order=cart.map(p=>p.name).join(",");
emailjs.send("service_ijy8vdb","template_a2hou6i",{
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
address:document.getElementById("address").value,
referral:document.getElementById("referral").value,
delivery:"R"+deliveryFee,
order:order,
total:document.getElementById("totalPrice").innerText
});
alert("Order sent!");
}

loadPerfumes(perfumes);

</script>

</body>
</html>
