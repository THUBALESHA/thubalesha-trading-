<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THUBALESHA Fragrance</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins,sans-serif;margin:0;background:#0f0f0f;color:white;}
header{background:black;padding:20px;text-align:center;border-bottom:1px solid gold;}
.logo{font-size:28px;color:gold;letter-spacing:3px;font-weight:600;}
nav a{color:white;text-decoration:none;margin:0 10px;}
nav a:hover{color:gold;}
.section{max-width:1200px;margin:auto;padding:40px 20px;}
.family-title{color:gold;font-size:22px;margin-bottom:20px;border-left:4px solid gold;padding-left:10px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
.card{background:#1a1a1a;padding:20px;border-radius:15px;text-align:center;box-shadow:0 5px 15px rgba(0,0,0,.5);transition:0.3s;}
.card:hover{transform:translateY(-5px);box-shadow:0 10px 20px rgba(255,215,0,0.3);}
.card img{width:100%;border-radius:10px;margin-bottom:10px;}
.price{color:gold;margin:10px 0;}
button{padding:10px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:600;margin:5px;}
.buy-btn{background:gold;color:black;}
.checkout{background:gold;color:black;width:100%;margin-top:10px;}
#cart{position:fixed;top:0;right:0;width:350px;height:100%;background:#111;padding:20px;overflow:auto;display:none;z-index:999;}
.cart-item{border-bottom:1px solid #333;padding:5px 0;font-size:14px;}
input,select{width:100%;padding:8px;margin:5px 0;border-radius:5px;border:none;}
footer{background:black;text-align:center;padding:20px;border-top:1px solid gold;margin-top:40px;}
.bank-box{background:#1a1a1a;padding:15px;border-radius:10px;font-size:14px;margin-top:10px;}
.whatsapp-btn{background:#25D366;color:white;}
.success{display:none;background:green;padding:15px;text-align:center;margin:10px;border-radius:10px;}
</style>
</head>
<body>

<header>
<div class="logo">THUBALESHA FRAGRANCE</div>
<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#" onclick="toggleCart()">Cart 🛒</a>
</nav>
</header>

<div id="cart">
<h3>Your Cart</h3>
<div id="cart-items"></div>
<p><strong>Total: R<span id="total">0</span></strong></p>

<h4>Shipping Details</h4>
<input id="name" placeholder="Full Name">
<input id="address" placeholder="Address">
<input id="city" placeholder="City">
<input id="email" placeholder="Email">
<select id="region">
<option>Gauteng</option>
<option>Western Cape</option>
<option>KwaZulu-Natal</option>
<option>Eastern Cape</option>
<option>Free State</option>
<option>Limpopo</option>
<option>Mpumalanga</option>
<option>North West</option>
<option>Northern Cape</option>
</select>
<input id="phone" placeholder="Phone Number">
<input id="shipping" type="number" value="50">

<!-- PAYFAST SAFE -->
<form action="https://www.payfast.co.za/eng/process" method="POST">
<input type="hidden" name="merchant_id" value="33541893">
<input type="hidden" name="amount" id="pf_amount">
<input type="hidden" name="item_name" id="pf_item">
<input type="hidden" name="name_first" id="pf_name">
<input type="hidden" name="email_address" id="pf_email">
<button class="checkout" type="submit">Pay with PayFast</button>
</form>

<button class="checkout" onclick="checkoutYoco()">Pay with Yoco</button>

<a href="https://www.paypal.com/ncp/payment/HD72KPTQ3Q8AG" target="_blank">
<button class="checkout">Pay with PayPal</button>
</a>

<button class="checkout whatsapp-btn" onclick="orderWhatsApp()">Order via WhatsApp</button>

<div class="bank-box">
<strong>EFT Bank Payment (Tyme Bank)</strong><br><br>
Bank: Tyme Bank<br>
Account Name: THUBALESHA Fragrance<br>
Account Number: 5300 0064 836<br>
Account Type: Current<br>
Branch Code: 678910
</div>
</div>

<div class="section">
<div class="family-title">Perfume Collection – R230 Each</div>
<div class="grid" id="products"></div>
</div>

<footer>© 2026 THUBALESHA Fragrance</footer>

<script src="https://js.yoco.com/sdk/v1/yoco-sdk-web.js"></script>
<script>
// Perfumes with placeholder images (replace with real URLs)
const perfumes=[
{name:"Dunhill Blue", img:"https://via.placeholder.com/220x220?text=Dunhill+Blue"},
{name:"Lacoste Blue", img:"https://via.placeholder.com/220x220?text=Lacoste+Blue"},
{name:"Dior Poison", img:"https://via.placeholder.com/220x220?text=Dior+Poison"},
{name:"Dolce & Gabbana Light Blue Women", img:"https://via.placeholder.com/220x220?text=D&G+Light+Blue"},
{name:"Chanel No.5", img:"https://via.placeholder.com/220x220?text=Chanel+No5"},
{name:"Black Axe", img:"https://via.placeholder.com/220x220?text=Black+Axe"},
{name:"Lady Million", img:"https://via.placeholder.com/220x220?text=Lady+Million"},
{name:"Creed Aventus", img:"https://via.placeholder.com/220x220?text=Creed+Aventus"},
{name:"Sheriff", img:"https://via.placeholder.com/220x220?text=Sheriff"},
{name:"Aramis 900", img:"https://via.placeholder.com/220x220?text=Aramis+900"},
{name:"Elizabeth Arden Red Door", img:"https://via.placeholder.com/220x220?text=Red+Door"},
{name:"Paco Rabanne One Million", img:"https://via.placeholder.com/220x220?text=One+Million"},
{name:"Invictus", img:"https://via.placeholder.com/220x220?text=Invictus"},
{name:"Carolina Herrera Good Girl", img:"https://via.placeholder.com/220x220?text=Good+Girl"},
{name:"Lancome La Vie Est Belle", img:"https://via.placeholder.com/220x220?text=La+Vie+Est+Belle"},
{name:"Tom Ford Oud Wood", img:"https://via.placeholder.com/220x220?text=Oud+Wood"},
{name:"Dunhill Red", img:"https://via.placeholder.com/220x220?text=Dunhill+Red"},
{name:"YSL Black Opium", img:"https://via.placeholder.com/220x220?text=Black+Opium"}
];

const price=230;
let cart=[];
const products=document.getElementById("products");
perfumes.forEach(p=>{
products.innerHTML+=`
<div class="card">
<img src="${p.img}" alt="${p.name}">
${p.name}
<div class="price">R230</div>
<button class="buy-btn" onclick="addToCart('${p.name}')">Add to Cart</button>
</div>
`;
});

function addToCart(name){cart.push(name);updateCart();toggleCart(true);}
function updateCart(){
const cartItems=document.getElementById("cart-items");cartItems.innerHTML="";
cart.forEach(item=>{cartItems.innerHTML+=`<div class="cart-item">${item} - R230</div>`;});
const ship=parseFloat(document.getElementById("shipping").value)||0;
const total=cart.length*price+ship;
document.getElementById("total").innerText=total;
document.getElementById("pf_amount").value=total;
document.getElementById("pf_item").value=cart.join(",");
document.getElementById("pf_name").value=document.getElementById("name").value;
document.getElementById("pf_email").value=document.getElementById("email").value;
}

function toggleCart(force){const cartDiv=document.getElementById("cart");if(force===true){cartDiv.style.display="block";return;}cartDiv.style.display=cartDiv.style.display==="block"?"none":"block";}
function checkoutYoco(){if(cart.length===0){alert("Cart empty");return;}const ship=parseFloat(document.getElementById("shipping").value)||0;const total=(cart.length*price+ship)*100;const yoco=new window.YocoSDK({publicKey:"pk_test_YOCO_PUBLIC_KEY"});yoco.showPopup({amount:total,currency:"ZAR",name:"THUBALESHA Fragrance"});}
function orderWhatsApp(){if(cart.length===0){alert("Cart empty");return;}const ship=parseFloat(document.getElementById("shipping").value)||0;const total=cart.length*price+ship;let message="Hello I want to order:%0A";cart.forEach(p=>{message+=p+" - R230%0A";});message+="Shipping: R"+ship+"%0ATotal: R"+total;window.open("https://wa.me/27787102337?text="+message);}
</script>
</body>
</html>
