<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
font-family: Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
font-size:15px;
}

button{
width:100%;
padding:12px;
background:black;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#333;
}

.message{
text-align:center;
margin-top:15px;
font-size:14px;
}

.success{
color:green;
}

.error{
color:red;
}

</style>

</head>

<body>

<div class="container">

<h2>Sign Up</h2>

<form id="signup-form">

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="tel" name="phone" placeholder="Phone Number" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Create Account</button>

</form>

<div id="message" class="message"></div>

</div>

<script>

(function(){
emailjs.init("0PazREzQtkxaCNEKN");
})();

document.getElementById("signup-form").addEventListener("submit", function(event){

event.preventDefault();

emailjs.sendForm(
"service_z1c4gpi",
"template_6ezz31q",
this
)

.then(function(){

document.getElementById("message").innerHTML =
"<span class='success'>Account created successfully!</span>";

document.getElementById("signup-form").reset();

},

function(error){

document.getElementById("message").innerHTML =
"<span class='error'>Failed to send. Try again.</span>";

});

});

</script>

</body>
</html>
