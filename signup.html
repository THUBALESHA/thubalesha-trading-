<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THUBALESHA Signup</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>

body{
font-family:Segoe UI, sans-serif;
background:#0a0a0a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#141414;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 0 25px rgba(255,215,0,0.4);
}

h2{
text-align:center;
margin-bottom:20px;
color:gold;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:6px;
background:#222;
color:white;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:gold;
border:none;
border-radius:6px;
font-weight:bold;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#ffd700;
}

.success{
margin-top:15px;
text-align:center;
color:#00ff9d;
font-weight:bold;
}

.error{
margin-top:15px;
text-align:center;
color:#ff4d4d;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>THUBALESHA Signup</h2>

<form id="signupForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="text" id="idnumber" placeholder="ID Number" required>

<input type="text" id="contact" placeholder="Contact Number" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="text" id="address" placeholder="Home Address" required>

<button type="submit">Sign Up</button>

</form>

<div id="message"></div>

</div>

<script>

emailjs.init("adDICiPkqP0ZG2cYyfi8B");

function generateReferral(){

const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

let code="THUBA-";

for(let i=0;i<6;i++){
code+=chars.charAt(Math.floor(Math.random()*chars.length));
}

return code;

}

document.getElementById("signupForm").addEventListener("submit",function(e){

e.preventDefault();

const referralCode=generateReferral();

const params={
name:document.getElementById("name").value,
id:document.getElementById("idnumber").value,
contact:document.getElementById("contact").value,
email:document.getElementById("email").value,
address:document.getElementById("address").value,
referral:referralCode
};

emailjs.send("service_z1c4gpi","template_signup",params)

.then(function(response){

document.getElementById("message").innerHTML=
"<div class='success'>Signup Successful!<br>Your Referral Code: <b>"+referralCode+"</b></div>";

document.getElementById("signupForm").reset();

})

.catch(function(error){

document.getElementById("message").innerHTML=
"<div class='error'>Signup failed. Check EmailJS settings.</div>";

console.log("EmailJS Error:", error);

});

});

</script>

</body>
</html>
